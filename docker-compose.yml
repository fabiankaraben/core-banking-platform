version: "3.9"

# ============================================================
# Core Banking Platform — Local Development Stack
# ============================================================
# Starts all infrastructure dependencies and microservices.
#
# Usage:
#   docker compose up --build          # full stack
#   docker compose up kafka redis      # infra only
#   docker compose down -v             # teardown + remove volumes
# ============================================================

x-common-healthcheck: &common-healthcheck
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 30s

x-service-env: &service-env
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  REDIS_HOST: redis
  REDIS_PORT: 6379
  ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans

networks:
  cbp-net:
    driver: bridge

volumes:
  account-db-data:
  transfer-db-data:
  notification-db-data:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
  redis-data:
  prometheus-data:
  grafana-data:

services:

  # ─── Infrastructure ─────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: cbp-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks: [cbp-net]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      <<: *common-healthcheck

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: cbp-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks: [cbp-net]
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      <<: *common-healthcheck

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cbp-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9093:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks: [cbp-net]

  redis:
    image: redis:7.2-alpine
    container_name: cbp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    networks: [cbp-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *common-healthcheck

  account-db:
    image: postgres:16-alpine
    container_name: cbp-account-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: account_db
      POSTGRES_USER: cbp_user
      POSTGRES_PASSWORD: cbp_pass
    volumes:
      - account-db-data:/var/lib/postgresql/data
    networks: [cbp-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbp_user -d account_db"]
      <<: *common-healthcheck

  transfer-db:
    image: postgres:16-alpine
    container_name: cbp-transfer-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: transfer_db
      POSTGRES_USER: cbp_user
      POSTGRES_PASSWORD: cbp_pass
    volumes:
      - transfer-db-data:/var/lib/postgresql/data
    networks: [cbp-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbp_user -d transfer_db"]
      <<: *common-healthcheck

  notification-db:
    image: postgres:16-alpine
    container_name: cbp-notification-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: cbp_user
      POSTGRES_PASSWORD: cbp_pass
    volumes:
      - notification-db-data:/var/lib/postgresql/data
    networks: [cbp-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbp_user -d notification_db"]
      <<: *common-healthcheck

  zipkin:
    image: openzipkin/zipkin:3
    container_name: cbp-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks: [cbp-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9411/health || exit 1"]
      <<: *common-healthcheck

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: cbp-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks: [cbp-net]

  grafana:
    image: grafana/grafana:10.4.0
    container_name: cbp-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on: [prometheus]
    networks: [cbp-net]

  # ─── Microservices ──────────────────────────────────────────────────────────

  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    container_name: cbp-account-service
    restart: unless-stopped
    depends_on:
      account-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      <<: *service-env
      DB_HOST: account-db
      DB_PORT: 5432
      DB_NAME: account_db
      DB_USER: cbp_user
      DB_PASSWORD: cbp_pass
    networks: [cbp-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      <<: *common-healthcheck

  transfer-service:
    build:
      context: .
      dockerfile: transfer-service/Dockerfile
    container_name: cbp-transfer-service
    restart: unless-stopped
    depends_on:
      transfer-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      <<: *service-env
      DB_HOST: transfer-db
      DB_PORT: 5432
      DB_NAME: transfer_db
      DB_USER: cbp_user
      DB_PASSWORD: cbp_pass
    networks: [cbp-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      <<: *common-healthcheck

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: cbp-notification-service
    restart: unless-stopped
    depends_on:
      notification-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      <<: *service-env
      DB_HOST: notification-db
      DB_PORT: 5432
      DB_NAME: notification_db
      DB_USER: cbp_user
      DB_PASSWORD: cbp_pass
    networks: [cbp-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      <<: *common-healthcheck

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: cbp-api-gateway
    restart: unless-stopped
    depends_on:
      account-service:
        condition: service_healthy
      transfer-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      <<: *service-env
      SPRING_REDIS_HOST: redis
      ACCOUNT_SERVICE_URL: http://account-service:8081
      TRANSFER_SERVICE_URL: http://transfer-service:8082
    networks: [cbp-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      <<: *common-healthcheck
